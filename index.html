<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Dark Realm: Survival</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
    }
    #game-container canvas {
      display: block;
      max-width: 100vw;
      max-height: 100vh;
    }
    /* Loading screen */
    #loading {
      position: fixed; inset: 0;
      background: #05050f;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      color: #cc8800;
      font-family: Georgia, serif;
      z-index: 9999;
      transition: opacity 0.5s;
    }
    #loading h1 { font-size: 3rem; letter-spacing: 6px; margin-bottom: 12px; }
    #loading p  { color: #555; font-size: 1rem; letter-spacing: 3px; }
    #loading .bar-wrap { width: 300px; height: 4px; background: #222; border-radius: 2px; margin-top: 30px; }
    #loading .bar { height: 4px; background: #cc8800; border-radius: 2px; width: 0%; animation: loadBar 1.5s ease forwards; }
    @keyframes loadBar { to { width: 100%; } }
  </style>
</head>
<body>
  <div id="loading">
    <h1>DARK REALM</h1>
    <p>SURVIVAL</p>
    <div class="bar-wrap"><div class="bar"></div></div>
  </div>
  <div id="game-container"></div>

  <!-- Phaser 3 CDN -->
  <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
  <script src="game.js"></script>
</body>
</html>
