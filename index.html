<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Dark Realm: Survival</title>
  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    html, body {
      width:100%; height:100%;
      background:#000;
      overflow:hidden;
      touch-action:none;
      user-select:none;
      -webkit-user-select:none;
    }
    body {
      display:flex;
      justify-content:center;
      align-items:center;
    }
    #game-container canvas {
      display:block;
      max-width:100vw;
      max-height:100vh;
    }
    /* Loading screen */
    #loading {
      position:fixed; inset:0;
      background:#04040e;
      display:flex; flex-direction:column;
      align-items:center; justify-content:center;
      z-index:9999;
      transition:opacity 0.5s;
    }
    #loading h1 {
      font-family:Georgia,serif;
      font-size:clamp(2rem,6vw,4rem);
      letter-spacing:8px;
      color:#cc8800;
      margin-bottom:10px;
      text-shadow:0 0 30px #ff8800;
    }
    #loading p {
      font-family:Georgia,serif;
      color:#444;
      font-size:clamp(0.8rem,2.5vw,1.1rem);
      letter-spacing:4px;
      margin-bottom:30px;
    }
    .bar-wrap { width:min(300px,70vw); height:3px; background:#1a1a2a; border-radius:2px; }
    .bar { height:3px; background:linear-gradient(90deg,#664400,#cc8800,#ffcc44); border-radius:2px;
           width:0; animation:lb 1.6s ease forwards; }
    @keyframes lb { to { width:100%; } }
    .hint {
      margin-top:28px;
      font-family:Georgia,serif;
      font-size:clamp(0.65rem,2vw,0.85rem);
      color:#333;
      letter-spacing:2px;
    }
  </style>
</head>
<body>
  <div id="loading">
    <h1>DARK REALM</h1>
    <p>S U R V I V A L</p>
    <div class="bar-wrap"><div class="bar"></div></div>
    <div class="hint" id="hint-text">Loading assets…</div>
  </div>
  <div id="game-container"></div>

  <script>
    // Show control hint based on device
    document.getElementById('hint-text').textContent =
      ('ontouchstart' in window) ? 'Left side: Joystick  |  Right side: Aim & Fire  |  [Q] Ultimate'
                                 : 'WASD: Move  |  Mouse: Aim  |  LMB: Fire  |  Q: Ultimate';
  </script>
  <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
  <script src="game.js"></script>
</body>
</html>
